<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUOM Music</title>
    <!-- Supabase Core Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- JavaScript Media Tags Metadata Extractor Browser Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --apple-red: #fa243c;
            --bg-base: #0d0d0d;
            --panel-glass: rgba(28, 28, 30, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
        }

        body {
            margin: 0;
            background: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--border-glass);
            padding: 35px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            background: var(--apple-red);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--apple-red);
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.05); }
        .nav-link.active { background: var(--apple-red); box-shadow: 0 4px 15px rgba(250, 36, 60, 0.3); }

        .main-view {
            padding: 40px 50px;
            overflow-y: auto;
            padding-bottom: 140px;
            background: radial-gradient(circle at top left, #1c1c1e 0%, var(--bg-base) 60%);
        }

        h2 { font-size: 34px; font-weight: 700; letter-spacing: -1px; margin-top: 0; margin-bottom: 25px; }

        .track-grid { display: flex; flex-direction: column; gap: 12px; max-width: 800px; }

        .track-card {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 14px 20px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .track-card:hover { background: rgba(44, 44, 46, 0.8); transform: translateY(-2px); }
        
        .track-meta-block { display: flex; align-items: center; gap: 16px; }
        
        .cover-art-frame {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            background: #2c2c2e;
            border: 1px solid var(--border-glass);
        }

        .track-info { font-size: 16px; font-weight: 600; }
        .track-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        .apple-btn {
            background: var(--apple-red);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .apple-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .apple-btn-secondary { background: rgba(255, 255, 255, 0.1); color: var(--text-main); border: 1px solid var(--border-glass); margin-left: 8px; }

        .player-dock-container { position: fixed; bottom: 30px; left: 290px; right: 30px; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .player-dock { width: 100%; max-width: 900px; background: rgba(30, 30, 30, 0.65); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 18px 30px; border-radius: 24px; display: flex; align-items: center; justify-content: center; pointer-events: auto; }

        .apple-input { width: 100%; max-width: 400px; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 15px; outline: none; }
        .apple-input:focus { border-color: var(--apple-red); }

        /* Cover Art Live Preview Elements */
        .preview-box { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 14px; max-width: 370px; border: 1px dashed var(--border-glass); }
        .preview-img { width: 90px; height: 90px; border-radius: 10px; object-fit: cover; background: #2c2c2e; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-title"><div class="brand-dot"></div>BLUOM Music</div>
        <div id="nav-home" class="nav-link active" onclick="switchView('home')">Listen Now</div>
        <div id="nav-upload" class="nav-link" onclick="switchView('upload')">Add Music (.mp3)</div>
    </div>

    <div class="main-view">
        <div id="view-home">
            <h2>Listen Now</h2>
            <div id="songs-list" class="track-grid">Connecting directly to BLUOM engine matrix...</div>
        </div>

        <div id="view-upload" class="hidden">
            <h2>Add Music Ledger</h2>
            <p style="color: var(--text-secondary); margin-bottom: 25px;">Publish raw audio assets into the BLUOM network layers.</p>
            
            <!-- File selector with corrected system MIME configuration mappings -->
            <input type="file" id="audio-file" accept=".mp3,audio/mpeg" onchange="inspectAudioMetadata()" style="margin-bottom: 20px;"><br>

            <!-- Real-time cover inspection layout card -->
            <div class="preview-box">
                <img id="ui-preview-cover" class="preview-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%23444' stroke-width='1.5'><path d='M9 18V5l12-2v13'/><circle cx='6' cy='18' r='3'/><circle cx='18' cy='16' r='3'/></svg>">
                <div>
                    <div style="font-weight:600; font-size:14px; color:var(--text-secondary);">Embedded Artwork</div>
                    <div id="cover-status-text" style="font-size:12px; color:#8e8e93; margin-top:4px;">No file staged</div>
                </div>
            </div>

            <input type="text" id="song-title" placeholder="Track Name" class="apple-input"><br>
            <input type="text" id="song-artist" placeholder="Group / Artist" class="apple-input"><br>
            
            <button id="upload-btn" onclick="executeCloudUpload()" class="apple-btn">Publish to Library</button>
        </div>
    </div>

    <div class="player-dock-container">
        <div class="player-dock">
            <audio id="main-audio" controls style="width: 100%; height: 40px;"></audio>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://cfztrgnzvppmlxieqixm.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_4RR_lfKEQbLQHHc8ctcSMQ_WXGygi-y";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let extractedCoverBlob = null; // Memory registry target for parsed images

        window.addEventListener('load', () => { loadCatalog(); });

        function switchView(target) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-upload').classList.add('hidden');
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-upload').classList.remove('active');
            document.getElementById(`view-${target}`).classList.remove('hidden');
            document.getElementById(`nav-${target}`).classList.add('active');
            if(target === 'home') loadCatalog();
        }

        // Auto-extract tags from file binary data arrays directly
        function inspectAudioMetadata() {
            const file = document.getElementById('audio-file').files[0];
            if (!file) return;

            document.getElementById('cover-status-text').innerText = "Scanning tags...";
            extractedCoverBlob = null;

            jsmediatags.read(file, {
                onSuccess: function(info) {
                    const tags = info.tags;
                    
                    // Auto-fill form inputs if metadata tags exist
                    if (tags.title) document.getElementById('song-title').value = tags.title;
                    if (tags.artist) document.getElementById('song-artist').value = tags.artist;

                    // Extract cover picture frames
                    if (tags.picture) {
                        const data = tags.picture.data;
                        const type = tags.picture.type;
                        const base64String = data.reduce((acc, byte) => acc + String.fromCharCode(byte), "");
                        
                        // Render direct screen preview array
                        document.getElementById('ui-preview-cover').src = `data:${type};base64,${btoa(base64String)}`;
                        document.getElementById('cover-status-text').innerText = "Cover art found!";

                        // Convert array block into binary blob file payload for cloud storage staging
                        const arrayBuffer = new Uint8Array(data).buffer;
                        extractedCoverBlob = new Blob([arrayBuffer], { type: type });
                    } else {
                        resetCoverToDefault("No artwork inside MP3");
                    }
                },
                onError: function(error) {
                    console.log('Metadata reader skipped:', error.type);
                    resetCoverToDefault("Could not read tags");
                }
            });
        }

        function resetCoverToDefault(msg) {
            document.getElementById('ui-preview-cover').src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%23444' stroke-width='1.5'><path d='M9 18V5l12-2v13'/><circle cx='6' cy='18' r='3'/><circle cx='18' cy='16' r='3'/></svg>";
            document.getElementById('cover-status-text').innerText = msg;
            extractedCoverBlob = null;
        }

        async function loadCatalog() {
            const container = document.getElementById('songs-list');
            let { data: songs, error } = await supabaseClient.rpc('get_bluom_songs');
            
            if (error) {
                container.innerHTML = `<p style="color:red">Engine sync fault: ${error.message}</p>`;
                return;
            }
            if (!songs || songs.length === 0) {
                container.innerHTML = '<p style="color:var(--text-secondary)">Your global cloud matrix catalog is empty.</p>';
                return;
            }

            container.innerHTML = '';
            songs.forEach(track => {
                const coverSrc = track.cover_url || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 24 24' fill='none' stroke='%23fa243c' stroke-width='1.5'><path d='M9 18V5l12-2v13'/><circle cx='6' cy='18' r='3'/><circle cx='18' cy='16' r='3'/></svg>";
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <div class="track-meta-block">
                        <img class="cover-art-frame" src="${coverSrc}">
                        <div class="track-info">
                            <div><strong>${track.title}</strong></div>
                            <div class="track-subtitle">${track.artist || 'Unknown Artist'}</div>
                        </div>
                    </div>
                    <div>
                        <button class="apple-btn" onclick="streamTrack('${track.audio_url}', '${track.id}')">Play</button>
                        <button class="apple-btn apple-btn-secondary" onclick="cacheTrackOffline('${track.audio_url}')">Offline</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function streamTrack(url) {
            const player = document.getElementById('main-audio');
            const cache = await caches.open('bluom-music-cache');
            const match = await cache.match(url);
            
            if(match) {
                const blob = await match.blob();
                player.src = URL.createObjectURL(blob);
            } else {
                player.src = url;
            }
            player.play();
        }

        async function cacheTrackOffline(url) {
            try {
                const cache = await caches.open('bluom-music-cache');
                await cache.add(url);
                alert('Track saved offline successfully.');
            } catch(e) {
                alert('Local cache pipeline storage failed.');
            }
        }

        async function executeCloudUpload() {
            const title = document.getElementById('song-title').value.trim();
            const artist = document.getElementById('song-artist').value.trim() || "Unknown Artist";
            const file = document.getElementById('audio-file').files[0];
            const btn = document.getElementById('upload-btn');

            if(!title || !file) {
                alert('Enter track name and pick an MP3 file.');
                return;
            }

            btn.innerText = "Processing Assets...";
            btn.disabled = true;

            let finalCoverUrl = null;

            // 1. If an embedded image exists, compile and upload it to storage
            if (extractedCoverBlob) {
                const coverName = `covers/${Date.now()}-cover.jpg`;
                let { data: cData, error: cErr } = await supabaseClient.storage.from('music-files').upload(coverName, extractedCoverBlob);
                if (!cErr) {
                    const { data: { publicUrl } } = supabaseClient.storage.from('music-files').getPublicUrl(coverName);
                    finalCoverUrl = publicUrl;
                }
            }

            // 2. Upload raw audio file payload
            const audioName = `tracks/${Date.now()}-${file.name}`;
            let { data: sData, error: sErr } = await supabaseClient.storage.from('music-files').upload(audioName, file);

            if(sErr) {
                alert(`Upload failed: ${sErr.message}`);
                btn.innerText = "Publish to Library";
                btn.disabled = false;
                return;
            }

            const { data: { publicUrl: audioUrl } } = supabaseClient.storage.from('music-files').getPublicUrl(audioName);

            // 3. Register to database tables with updated columns via RPC link maps
            let { error: dbErr } = await supabaseClient.rpc('add_bluom_song', { 
                track_title: title, 
                track_artist: artist, 
                track_url: audioUrl, 
                track_cover: finalCoverUrl 
            });

            if(dbErr) {
                alert(`DB Tracking write error: ${dbErr.message}`);
            } else {
                alert('Asset published successfully into system libraries!');
                document.getElementById('song-title').value = '';
                document.getElementById('song-artist').value = '';
                document.getElementById('audio-file').value = '';
                resetCoverToDefault("No file staged");
                switchView('home');
            }
            btn.innerText = "Publish to Library";
            btn.disabled = false;
        }
    </script>
</body>
</html>
