<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUOM Music</title>
    <!-- Supabase JS Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --apple-red: #fa243c;
            --bg-base: #0d0d0d;
            --panel-glass: rgba(28, 28, 30, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
        }

        body {
            margin: 0;
            background: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* Apple Glassmorphic Sidebar */
        .sidebar {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--border-glass);
            padding: 35px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            background: var(--apple-red);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--apple-red);
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            background: var(--apple-red);
            box-shadow: 0 4px 15px rgba(250, 36, 60, 0.3);
        }

        /* Main Content Container */
        .main-view {
            padding: 40px 50px;
            overflow-y: auto;
            padding-bottom: 140px;
            background: radial-gradient(circle at top left, #1c1c1e 0%, var(--bg-base) 60%);
        }

        h2 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-top: 0;
            margin-bottom: 25px;
        }

        /* Apple Music Card Lists */
        .track-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 800px;
        }

        .track-card {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 16px 24px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .track-card:hover {
            background: rgba(44, 44, 46, 0.8);
            transform: translateY(-2px);
        }

        .track-info th {
            font-size: 16px;
            font-weight: 600;
        }

        .track-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Interactive UI controls */
        .apple-btn {
            background: var(--apple-red);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .apple-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .apple-btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: 1px solid var(--border-glass);
            margin-left: 8px;
        }

        .apple-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Premium Floating Player Dock */
        .player-dock-container {
            position: fixed;
            bottom: 30px;
            left: 290px;
            right: 30px;
            display: flex;
            justify-content: center;
            z-index: 1000;
            pointer-events: none;
        }

        .player-dock {
            width: 100%;
            max-width: 900px;
            background: rgba(30, 30, 30, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        /* Input Elements */
        .apple-input {
            width: 100%;
            max-width: 400px;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        .apple-input:focus {
            border-color: var(--apple-red);
        }

        .hidden { display: none !important; }

        /* Credentials Overlay configuration system */
        .config-banner {
            background: #ff9500;
            color: black;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <!-- Connection Checker Notice banner -->
    <div id="setup-warning" class="config-banner">
        ⚠️ BLUOM Music Database Connection Required. Click "Upload" to add your Supabase keys.
    </div>

    <!-- Sidebar Navigation Grid Component -->
    <div class="sidebar">
        <div class="brand-title">
            <div class="brand-dot"></div>
            BLUOM Music
        </div>
        <div id="nav-home" class="nav-link active" onclick="switchView('home')">Listen Now</div>
        <div id="nav-upload" class="nav-link" onclick="switchView('upload')">Add Music (.mp3)</div>
    </div>

    <!-- Fluid Content Panel -->
    <div class="main-view">
        <div id="view-home">
            <h2>Listen Now</h2>
            <div id="songs-list" class="track-grid">Loading your cloud catalog...</div>
        </div>

        <div id="view-upload" class="hidden">
            <h2>Add Music Ledger</h2>
            <div id="key-configuration" style="margin-bottom: 30px; padding: 20px; background: rgba(255,149,0,0.1); border-radius: 12px; border: 1px solid #ff9500;">
                <h4 style="margin-top:0; color: #ff9500;">Developer API Link Engine</h4>
                <input type="text" id="sb-url" placeholder="Supabase Project URL" class="apple-input" style="margin-bottom:10px;"><br>
                <input type="password" id="sb-key" placeholder="Supabase Anon Public Key" class="apple-input" style="margin-bottom:0;">
                <p style="font-size:12px; color: var(--text-secondary); margin-top:8px;">These variables save securely inside your local browser storage engine sandbox.</p>
            </div>

            <input type="text" id="song-title" placeholder="Track Name" class="apple-input"><br>
            <input type="file" id="audio-file" accept="audio/mp3" style="margin-bottom: 20px;"><br>
            <button id="upload-btn" onclick="executeCloudUpload()" class="apple-btn">Publish to Library</button>
        </div>
    </div>

    <!-- Floating Playback Docking System -->
    <div class="player-dock-container">
        <div class="player-dock">
            <audio id="main-audio" controls style="width: 100%; height: 40px;"></audio>
        </div>
    </div>

    <script>
        let supabaseClient = null;

        // Configuration memory retrieval
        window.addEventListener('load', () => {
            const savedUrl = localStorage.getItem('BLUOM_SB_URL');
            const savedKey = localStorage.getItem('BLUOM_SB_KEY');
            
            if(savedUrl && savedKey) {
                document.getElementById('sb-url').value = savedUrl;
                document.getElementById('sb-key').value = savedKey;
                initSupabase(savedUrl, savedKey);
            }
        });

        function initSupabase(url, key) {
            try {
                supabaseClient = supabase.createClient(url, key);
                document.getElementById('setup-warning').classList.add('hidden');
                loadCatalog();
            } catch(e) {
                console.error("Initialization fault:", e);
            }
        }

        function switchView(target) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-upload').classList.add('hidden');
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-upload').classList.remove('active');

            document.getElementById(`view-${target}`).classList.remove('hidden');
            document.getElementById(`nav-${target}`).classList.add('active');

            if(target === 'home') loadCatalog();
        }

        async function loadCatalog() {
            const container = document.getElementById('songs-list');
            if(!supabaseClient) {
                container.innerHTML = `<p style="color:#ff9500">Awaiting database connection parameters. Go to 'Add Music' to enter details.</p>`;
                return;
            }

            let { data: songs, error } = await supabaseClient.from('songs').select('*').order('created_at', { ascending: false });
            
            if (error) {
                container.innerHTML = `<p style="color:red">Engine sync error: ${error.message}</p>`;
                return;
            }
            if (songs.length === 0) {
                container.innerHTML = '<p style="color:var(--text-secondary)">Your global cloud matrix catalog is empty.</p>';
                return;
            }

            container.innerHTML = '';
            songs.forEach(track => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <div class="track-info">
                        <div><strong>${track.title}</strong></div>
                        <div class="track-subtitle">BLUOM Verified Lossless Audio Asset</div>
                    </div>
                    <div>
                        <button class="apple-btn" onclick="streamTrack('${track.audio_url}')">Play</button>
                        <button class="apple-btn apple-btn-secondary" onclick="cacheTrackOffline('${track.audio_url}')">Download</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function streamTrack(url) {
            const player = document.getElementById('main-audio');
            const cache = await caches.open('bluom-music-cache');
            const match = await cache.match(url);
            
            if(match) {
                const blob = await match.blob();
                player.src = URL.createObjectURL(blob);
            } else {
                player.src = url;
            }
            player.play();
        }

        async function cacheTrackOffline(url) {
            try {
                const cache = await caches.open('bluom-music-cache');
                await cache.add(url);
                alert('Track downloaded safely to local sandboxed sandbox allocation.');
            } catch(e) {
                alert('Local download execution failed.');
            }
        }

        async function executeCloudUpload() {
            const urlInput = document.getElementById('sb-url').value.trim();
            const keyInput = document.getElementById('sb-key').value.trim();
            const title = document.getElementById('song-title').value.trim();
            const file = document.getElementById('audio-file').files[0];
            const btn = document.getElementById('upload-btn');

            if(urlInput && keyInput && (!supabaseClient)) {
                localStorage.setItem('BLUOM_SB_URL', urlInput);
                localStorage.setItem('BLUOM_SB_KEY', keyInput);
                initSupabase(urlInput, keyInput);
            }

            if(!supabaseClient) {
                alert('Database connection config fields are required first.');
                return;
            }
            if(!title || !file) {
                alert('Enter track name and supply file targets.');
                return;
            }

            btn.innerText = "Encoding & Uploading Asset...";
            btn.disabled = true;

            const nameToken = `${Date.now()}-${file.name}`;
            let { data: sData, error: sErr } = await supabaseClient.storage.from('music-files').upload(nameToken, file);

            if(sErr) {
                alert(`Upload failed: ${sErr.message}`);
                btn.innerText = "Publish to Library";
                btn.disabled = false;
                return;
            }

            const { data: { publicUrl } } = supabaseClient.storage.from('music-files').getPublicUrl(nameToken);

            let { error: dbErr } = await supabaseClient.from('songs').insert([{ title: title, audio_url: publicUrl }]);

            if(dbErr) {
                alert(`DB tracking entry creation failed: ${dbErr.message}`);
            } else {
                alert('Asset live on network.');
                document.getElementById('song-title').value = '';
                document.getElementById('audio-file').value = '';
                switchView('home');
            }
            btn.innerText = "Publish to Library";
            btn.disabled = false;
        }
    </script>
</body>
</html>
