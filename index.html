<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUOM Music</title>
    <!-- Supabase JS Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --apple-red: #fa243c;
            --bg-base: #0d0d0d;
            --panel-glass: rgba(28, 28, 30, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
        }

        body {
            margin: 0;
            background: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--border-glass);
            padding: 35px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-dot {
            width: 10px;
            height: 10px;
            background: var(--apple-red);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--apple-red);
        }

        .nav-link {
            color: var(--text-main);
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.05); }
        .nav-link.active { background: var(--apple-red); box-shadow: 0 4px 15px rgba(250, 36, 60, 0.3); }

        .main-view {
            padding: 40px 50px;
            overflow-y: auto;
            padding-bottom: 140px;
            background: radial-gradient(circle at top left, #1c1c1e 0%, var(--bg-base) 60%);
        }

        h2 { font-size: 34px; font-weight: 700; letter-spacing: -1px; margin-top: 0; margin-bottom: 25px; }

        .track-grid { display: flex; flex-direction: column; gap: 12px; max-width: 800px; }

        .track-card {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 16px 24px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .track-card:hover { background: rgba(44, 44, 46, 0.8); transform: translateY(-2px); }
        .track-info { font-size: 16px; font-weight: 600; }
        .track-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

        .apple-btn {
            background: var(--apple-red);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .apple-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .apple-btn-secondary { background: rgba(255, 255, 255, 0.1); color: var(--text-main); border: 1px solid var(--border-glass); margin-left: 8px; }
        .apple-btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }

        .player-dock-container { position: fixed; bottom: 30px; left: 290px; right: 30px; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .player-dock { width: 100%; max-width: 900px; background: rgba(30, 30, 30, 0.65); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 18px 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; pointer-events: auto; }

        .apple-input { width: 100%; max-width: 400px; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 12px; color: white; font-size: 16px; margin-bottom: 20px; outline: none; }
        .apple-input:focus { border-color: var(--apple-red); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-title"><div class="brand-dot"></div>BLUOM Music</div>
        <div id="nav-home" class="nav-link active" onclick="switchView('home')">Listen Now</div>
        <div id="nav-upload" class="nav-link" onclick="switchView('upload')">Add Music (.mp3)</div>
    </div>

    <div class="main-view">
        <div id="view-home">
            <h2>Listen Now</h2>
            <div id="songs-list" class="track-grid">Connecting directly to BLUOM engine matrix...</div>
        </div>

        <div id="view-upload" class="hidden">
            <h2>Add Music Ledger</h2>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Publish raw audio assets into the BLUOM network infrastructure layers.</p>
            <input type="text" id="song-title" placeholder="Track Name" class="apple-input"><br>
            <input type="file" id="audio-file" accept="audio/mp3" style="margin-bottom: 20px;"><br>
            <button id="upload-btn" onclick="executeCloudUpload()" class="apple-btn">Publish to Library</button>
        </div>
    </div>

    <div class="player-dock-container">
        <div class="player-dock">
            <audio id="main-audio" controls style="width: 100%; height: 40px;"></audio>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://cfztrgnzvppmlxieqixm.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_4RR_lfKEQbLQHHc8ctcSMQ_WXGygi-y";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.addEventListener('load', () => {
            loadCatalog();
        });

        function switchView(target) {
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-upload').classList.add('hidden');
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-upload').classList.remove('active');

            document.getElementById(`view-${target}`).classList.remove('hidden');
            document.getElementById(`nav-${target}`).classList.add('active');

            if(target === 'home') loadCatalog();
        }

        async function loadCatalog() {
            const container = document.getElementById('songs-list');
            
            // BYPASS METHOD: Calling the SQL RPC directly to avoid PostgREST cache layer bugs
            let { data: songs, error } = await supabaseClient.rpc('get_bluom_songs');
            
            if (error) {
                container.innerHTML = `<p style="color:red">Engine sync fault bypassed. Details: ${error.message}</p>`;
                return;
            }
            if (!songs || songs.length === 0) {
                container.innerHTML = '<p style="color:var(--text-secondary)">Your global cloud matrix catalog is empty. Start by uploading an MP3.</p>';
                return;
            }

            container.innerHTML = '';
            songs.forEach(track => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.innerHTML = `
                    <div class="track-info">
                        <div><strong>${track.title}</strong></div>
                        <div class="track-subtitle">BLUOM Verified Lossless Audio Asset</div>
                    </div>
                    <div>
                        <button class="apple-btn" onclick="streamTrack('${track.audio_url}')">Play</button>
                        <button class="apple-btn apple-btn-secondary" onclick="cacheTrackOffline('${track.audio_url}')">Offline Cache</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function streamTrack(url) {
            const player = document.getElementById('main-audio');
            const cache = await caches.open('bluom-music-cache');
            const match = await cache.match(url);
            
            if(match) {
                const blob = await match.blob();
                player.src = URL.createObjectURL(blob);
            } else {
                player.src = url;
            }
            player.play();
        }

        async function cacheTrackOffline(url) {
            try {
                const cache = await caches.open('bluom-music-cache');
                await cache.add(url);
                alert('Track downloaded safely to local browser storage partition.');
            } catch(e) {
                alert('Local cache pipeline initialization failed.');
            }
        }

        async function executeCloudUpload() {
            const title = document.getElementById('song-title').value.trim();
            const file = document.getElementById('audio-file').files[0];
            const btn = document.getElementById('upload-btn');

            if(!title || !file) {
                alert('Enter track name and supply file targets.');
                return;
            }

            btn.innerText = "Encoding & Uploading Asset...";
            btn.disabled = true;

            const nameToken = `${Date.now()}-${file.name}`;
            let { data: sData, error: sErr } = await supabaseClient.storage.from('music-files').upload(nameToken, file);

            if(sErr) {
                alert(`Upload failed: ${sErr.message}`);
                btn.innerText = "Publish to Library";
                btn.disabled = false;
                return;
            }

            const { data: { publicUrl } } = supabaseClient.storage.from('music-files').getPublicUrl(nameToken);

            // BYPASS METHOD: Writing the tracking entry via RPC function
            let { error: dbErr } = await supabaseClient.rpc('add_bluom_song', { track_title: title, track_url: publicUrl });

            if(dbErr) {
                alert(`DB tracking entry creation failed: ${dbErr.message}`);
            } else {
                alert('Asset successfully written to database engine maps!');
                document.getElementById('song-title').value = '';
                document.getElementById('audio-file').value = '';
                switchView('home');
            }
            btn.innerText = "Publish to Library";
            btn.disabled = false;
        }
    </script>
</body>
</html>
